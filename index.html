<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Balloon Clicker</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: #87CEEB;
}

#menu {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #222;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    background: orange;
}

#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 24px;
    color: white;
    z-index: 5;
}

#balloon {
    position: absolute;
    width: 80px;
    height: 100px;
    background: red;
    border-radius: 50%;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="menu">
    <h1>🎈 Balloon Clicker</h1>
    <button onclick="startGame()">Commencer</button>
</div>

<div id="score">Score : 0</div>
<div id="balloon"></div>

<script>
let score = 0;
let speed = 1500; // temps entre déplacements
let interval;

const balloon = document.getElementById("balloon");

function startGame() {
    document.getElementById("menu").style.display = "none";

    moveBalloon();

    interval = setInterval(() => {
        moveBalloon();
    }, speed);
}

function randomPos() {
    return {
        x: Math.random() * (window.innerWidth - 100),
        y: Math.random() * (window.innerHeight - 150)
    };
}

function moveBalloon() {
    const pos = randomPos();
    balloon.style.left = pos.x + "px";
    balloon.style.top = pos.y + "px";
}

// CLICK SUR BALLON
balloon.addEventListener("click", () => {
    score++;
    document.getElementById("score").innerText = "Score : " + score;

    // accélère le jeu (optionnel)
    if (speed > 400) speed -= 50;

    clearInterval(interval);
    interval = setInterval(moveBalloon, speed);

    moveBalloon(); // change direct la position
});
</script>

</body>
</html>
