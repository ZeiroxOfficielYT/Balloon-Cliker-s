<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Balloon Clicker</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial;
        background: #87CEEB;
    }

    #menu {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #222;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    button {
        padding: 15px 30px;
        font-size: 20px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
        background: orange;
    }

    #score {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 24px;
        color: white;
        z-index: 10;
    }

    #balloon {
        position: absolute;
        width: 80px;
        height: 100px;
        background: red;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.1s;
    }

    .pop {
        transform: scale(1.4);
    }
</style>
</head>

<body>

<div id="menu">
    <h1>🎈 Balloon Clicker</h1>
    <button onclick="startGame()">Commencer</button>
</div>

<div id="score">Score : 0</div>
<div id="balloon" onclick="popBalloon()"></div>

<script>
let score = 0;
let speed = 1;
let interval;
let balloon = document.getElementById("balloon");

function startGame() {
    document.getElementById("menu").style.display = "none";
    moveBalloon();
    interval = setInterval(moveBalloon, 1000 / speed);
}

function randomPos() {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 150);
    return {x, y};
}

function moveBalloon() {
    let pos = randomPos();
    balloon.style.left = pos.x + "px";
    balloon.style.top = pos.y + "px";
}

function popBalloon() {
    score++;
    document.getElementById("score").innerText = "Score : " + score;

    // accélération
    speed += 0.2;
    clearInterval(interval);
    interval = setInterval(moveBalloon, 1000 / speed);

    // effet pop
    balloon.classList.add("pop");
    setTimeout(() => balloon.classList.remove("pop"), 100);

    // change position direct
    moveBalloon();
}
</script>

</body>
</html>
